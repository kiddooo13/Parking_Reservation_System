{% extends "base.html" %}
{% block content %}
<h2>Admin: Manage Parking Lots</h2>

<h3>Add a new lot</h3>
<form method="POST">
  <label>Lot name</label>
  <input name="name" required>
  <label>Location (address)</label>
  <input name="location" required>
  <label>Latitude</label>
  <input name="latitude" >
  <label>Longitude</label>
  <input name="longitude">
  <label>Price (₹ per booking)</label>
  <input type="number" step="0.01" name="price" required>
  <label>Total slots</label>
  <input type="number" name="slots" required min="1">
  <button type="submit">Add lot</button>
</form>

<h3>Your lots</h3>
<table>
  <tr><th>ID</th><th>Name</th><th>Price</th><th>Slots</th><th>View</th></tr>
  {% for lot in lots %}
  <tr>
    <td>{{lot.id}}</td>
    <td>{{lot.name}}</td>
    <td>₹{{lot.price}}</td>
    <td>{{lot.slots}}</td>
    <td><a class="btn" href="{{ url_for('lot_view', lot_id=lot.id) }}">View grid</a></td>
  </tr>
  {% endfor %}
</table>
{% endblock %}
