{% extends "base.html" %}
{% block content %}
<h2>Daily Revenue Trend for Admin {{owner_id}}</h2>
<div class="chart"><canvas id="revenueChart"></canvas></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  const labels = [{% for row in trend %}'{{row.day}}',{% endfor %}];
  const data = [{% for row in trend %}{{row.total}},{% endfor %}];
  new Chart(document.getElementById('revenueChart'), {
    type: 'line',
    data: { labels, datasets: [{ label: 'Revenue (₹)', data, borderColor: '#0096C7', backgroundColor: '#66a3ff', fill: true, tension: 0.3 }] }
  });
</script>
{% endblock %}
